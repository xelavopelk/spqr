name: tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  IMAGE_SHARD: spqr-shard-image
  SHARD_CACHE_KEY: sha256sum-of-docker-shard
  CACHE_FILE_SHARD: ~/spqr-shard-image-shard-cache-key.tgz

jobs:

  unit:
     name: unit
     runs-on: ubuntu-latest
     steps:

     - name: Check out code
       uses: actions/checkout@v7

     - name: unit tests
       run: make unittest
  etcdqdb_integration:
     name: etcdqdb_integration
     runs-on: ubuntu-latest
     steps:

     - name: Check out code
       uses: actions/checkout@v7

     - name: etcdqdb_integration tests
       run: make etcdqdb_test
       
  cli-overrides:
    name: cli_overrides
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Install test deps
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq gawk coreutils procps

      - name: Prepare postgres runtime dir for unix socket
        run: |
          set -euo pipefail
          sudo mkdir -p /var/run/postgresql
          sudo chmod 1777 /var/run/postgresql

      - name: Run CLI override
        timeout-minutes: 5
        run: |
          set -euo pipefail
          make test-cli-overrides

  stress:
    name: stress
    runs-on: ubuntu-latest
    needs: ['cli-overrides']
    steps:

      - name: Check out code
        uses: actions/checkout@v7

      - name: stress tests
        run: make stress

  regress-pgdg:
    name: regress
    runs-on: ubuntu-latest
    needs: ['unit', 'stress', 'gorm-regress', 'jdbc-regress']

    strategy:
      matrix:
        os-version: ['jammy', 'noble']
        version: ['14', '15', '16', '17', '18']
        # temporary solution due to problems with yandex registry
        # version: ['13', '14', '15', '16', '17', '13-mdb', '14-mdb', '15-mdb', '16-mdb', '17-mdb']

    steps:

      - name: Check out code
        uses: actions/checkout@v7

      - name: Run tests
        run: |
             if [[ ${{ matrix.version }} == *"-mdb" ]]; then 
                version=$(echo ${{ matrix.version }} | awk '{ print substr($1, 1, 2)  }'); 
                if !(REGRESS_REPORT_DIR=/regress/test-reports/regress/${{ matrix.os-version }}-${{ matrix.version }} make POSTGRES_VERSION=$version codename=${{ matrix.os-version }} mdb-branch=MDB_$version shard-image=shard-image-mdb regress); then
                  docker compose -f test/regress/docker-compose.yaml ps -a --format "table {{.ID}}\t{{.Status}}" | awk 'tolower($0) ~ /unhealthy/ {print $1}' | xargs -r -n 1 docker logs;
                  exit 1;
                fi
             else 
                if !(REGRESS_REPORT_DIR=/regress/test-reports/regress/${{ matrix.os-version }}-${{ matrix.version }} make POSTGRES_VERSION=${{ matrix.version }} codename=${{ matrix.os-version }} regress; ); then
                  docker compose -f test/regress/docker-compose.yaml ps -a --format "table {{.ID}}\t{{.Status}}" | awk 'tolower($0) ~ /unhealthy/ {print $1}' | xargs -r -n 1 docker logs;
                  exit 1;
                fi
             fi

      - name: Upload regress test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-regress-${{ matrix.os-version }}-${{ matrix.version }}
          path: test-reports/regress/**/*.xml
          if-no-files-found: ignore

  regress-clustered-pgdg:
    name: regress-clustered
    runs-on: ubuntu-latest
    needs: ['unit', 'stress', 'gorm-regress', 'jdbc-regress', 'regress-pgdg']

    strategy:
      matrix:
        os-version: ['jammy', 'noble']
        version: ['14', '15', '16', '17', '18']
    steps:

      - name: Check out code
        uses: actions/checkout@v7

      - name: Run tests
        run: |
              if !(REGRESS_REPORT_DIR=/regress/test-reports/regress-coord/${{ matrix.os-version }}-${{ matrix.version }} make POSTGRES_VERSION=${{ matrix.version }} codename=${{ matrix.os-version }} regress_coord; ); then
                docker compose -f test/regress/docker-compose-coord.yaml ps -a --format "table {{.ID}}\t{{.Status}}" | awk 'tolower($0) ~ /unhealthy/ {print $1}' | xargs -r -n 1 docker logs;
                exit 1;
              fi

      - name: Upload regress clustered test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-regress-coord-${{ matrix.os-version }}-${{ matrix.version }}
          path: test-reports/regress-coord/**/*.xml
          if-no-files-found: ignore

  isolation-regress:
    name: isolation-tests
    runs-on: ubuntu-latest
    needs: ['unit', 'stress', 'gorm-regress', 'jdbc-regress']

    steps:

      - name: Check out code
        uses: actions/checkout@v7

      - name: Run tests
        run: |
          if !(make isolation_regress); then
            docker compose -f test/isolation/docker-compose.yaml ps -a --format "table {{.ID}}\t{{.Status}}" | awk 'tolower($0) ~ /unhealthy/ {print $1}' | xargs -r -n 1 docker logs;
            exit 1;
          fi

      - name: Upload isolation test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-isolation
          path: test-reports/isolation/**/*.xml
          if-no-files-found: ignore

  gorm-regress:
    name: drivers_gorm
    runs-on: ubuntu-latest
    steps:

      - name: Check out code
        uses: actions/checkout@v7

      - name: Run tests
        run: make gorm_regress

  jdbc-regress:
    name: drivers_jdbc
    runs-on: ubuntu-latest
    steps:

      - name: Check out code
        uses: actions/checkout@v7

      - name: Run tests
        run: make jdbc_regress

  proto-regress-simple:
    name: proto-simple
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Simple proto
        run: PROTO_TEST_TAG=simple make xproto_regress

  proto-regress-xproto:
    name: proto-extended
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Extended proto
        run: PROTO_TEST_TAG=xproto make xproto_regress

  proto-regress-xproto-portal-suspect:
    name: proto-extended-portal-suspend
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Extended proto with portal suspend
        run: PROTO_TEST_TAG=xproto_suspend make xproto_regress

  proto-regress-copy:
    name: proto-copy
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Copy proto
        run: PROTO_TEST_TAG=copy make xproto_regress

  feature_prepare:
    name: feature_prepare
    runs-on: ubuntu-latest
    needs: ['unit', 'stress', 'regress-pgdg', 'regress-clustered-pgdg', 'gorm-regress', 'jdbc-regress']
    outputs:
      output1: ${{ steps.step1.outputs.features }}
    steps:
      - name: Check Docker Version
        run: docker --version

      - name: Check out code
        uses: actions/checkout@v7

      - id: step1
        run: |
          make split_feature_test
          array=$(find test/feature/generatedFeatures -type f -exec wc -l {} \; | sort -rn | awk '{printf $0"\n"}' | python3 .github/scenario_balancer.py)
          echo "features=$(echo "{\"command\": $array}")" >> $GITHUB_OUTPUT

      - name: Archive production artifacts
        uses: actions/upload-artifact@v7
        with:
          name: generated_tests
          path: |
            ./test/feature/generatedFeatures

      - name: Update env
        run: |
          SHARD_CACHE_KEY="spqr-shard-image-${{ hashFiles('docker/shard/**', 'docker-compose.yaml', 'Makefile') }}"
          CACHE_FILE_SHARD="~/$SHARD_CACHE_KEY.tgz"
          echo "SHARD_CACHE_KEY=$SHARD_CACHE_KEY" >> $GITHUB_ENV
          echo "CACHE_FILE_SHARD=$CACHE_FILE_SHARD" >> $GITHUB_ENV

      #  use cache to pass docker images to the test jobs
      - name: Docker shard image caching
        id: cache-shard-image
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.CACHE_FILE_SHARD }}
          key: ${{ env.SHARD_CACHE_KEY }}

      # build images
      - name: Build shard image
        if: steps.cache-shard-image.outputs.cache-hit != 'true'
        run: make save_shard_image


  feature:
    name: feature
    runs-on: ubuntu-latest
    needs: feature_prepare
    strategy:
      matrix: ${{ fromJson(needs.feature_prepare.outputs.output1) }}
      # do not cancel all tests if one failed
      fail-fast: false
    steps:
      - name: Install Latest Docker
        run: |
          for pkg in docker.io docker-doc podman-docker containerd runc; do sudo apt-get remove $pkg; done
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          sudo apt-get update
          sudo apt-get install docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
      - name: Check Docker Version
        run: docker --version
      - name: Check out code
        uses: actions/checkout@v7

      - name: Update env
        run: |
          SHARD_CACHE_KEY="spqr-shard-image-${{ hashFiles('docker/shard/**', 'docker-compose.yaml', 'Makefile') }}"
          CACHE_FILE_SHARD="~/$SHARD_CACHE_KEY.tgz"
          echo "SHARD_CACHE_KEY=$SHARD_CACHE_KEY" >> $GITHUB_ENV
          echo "CACHE_FILE_SHARD=$CACHE_FILE_SHARD" >> $GITHUB_ENV

      - name: Download generatedFeatures
        uses: actions/download-artifact@v8
        with:
          name: generated_tests
          path: ./test/feature/generatedFeatures

      # load docker images
      - name: Load shard image
        id: cache-shard-image
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.CACHE_FILE_SHARD }}
          key: ${{ env.SHARD_CACHE_KEY }}

      - name: feature tests
        run: ${{ matrix.command }}
        env:
          GODOG_JUNIT_REPORT: ../../test-reports/feature/feature-${{ strategy.job-index }}.xml

      - name: Upload feature test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-feature-${{ strategy.job-index }}
          path: test-reports/feature/**/*.xml
          if-no-files-found: ignore

  test-report:
    name: test-report
    runs-on: ubuntu-latest
    needs:
      - feature
      - regress-pgdg
      - regress-clustered-pgdg
      - isolation-regress
    if: always()
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download test reports
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: test-reports-*
          path: test-reports
          merge-multiple: true

      - name: Convert JUnit reports to CTRF
        continue-on-error: true
        run: |
          if [ -d test-reports ] && find test-reports -name '*.xml' -print -quit | grep -q .; then
            mkdir -p ctrf-reports
            npx --yes junit-to-ctrf "test-reports/**/*.xml" \
              -o ctrf-reports/ctrf-report.json \
              -t SPQR
          else
            echo "No JUnit XML reports found"
          fi

      - name: Upload CTRF report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ctrf-report-${{ github.run_id }}
          path: ctrf-reports/*.json
          if-no-files-found: ignore

      - name: Generate test history candidates
        if: always()
        continue-on-error: true
        run: |
          if [ -d test-reports ] && find test-reports -name '*.xml' -print -quit | grep -q .; then
            go run ./test/tools/test_history \
              --input-dir test-reports \
              --history-output test-history/test-history.jsonl \
              --candidates-output test-history/failure-candidates.json \
              --summary-output test-history/failure-candidates.md \
              --run-id "${{ github.run_id }}" \
              --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --workflow "${{ github.workflow }}" \
              --branch "${{ github.ref_name }}" \
              --sha "${{ github.sha }}" \
              --timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          else
            echo "No JUnit XML reports found"
          fi

      - name: Upload test history artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-history-${{ github.run_id }}
          path: test-history/**
          if-no-files-found: ignore

      - name: Add failure candidates to summary
        if: always()
        continue-on-error: true
        run: |
          if [ -f test-history/failure-candidates.md ]; then
            cat test-history/failure-candidates.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish CTRF test report
        uses: ctrf-io/github-test-reporter@v1
        continue-on-error: true
        with:
          report-path: 'ctrf-reports/*.json'
          summary-report: true
          failed-report: true
          fail-rate-report: true
          flaky-rate-report: true
          slowest-report: true
          insights-report: true
          upload-artifact: true
          exit-on-fail: false
          exit-on-no-files: false
          exit-on-empty: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
